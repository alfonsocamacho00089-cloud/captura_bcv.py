name: Actualizador de Tasas BCV

on:
  schedule:
    # Revisa a las 4:00 PM, 5:00 PM, 6:00 PM (Hora Vzla)
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # Esto te permite darle a un botón para actualizar YA

jobs:
  actualizar-data:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v2

      - name: Instalar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Correr Script
        run: python captura_bcv.py

      - name: Guardar cambios en el repo
        run: |
          git config --global user.name 'Robot-BCV'
          git config --global user.email 'robot@github.com'
          git add bancos.json
          git commit -m "Tasas actualizadas automáticamente" || echo "No hay cambios"
          git push
